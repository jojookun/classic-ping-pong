<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Classic Ping Pong</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="crt scanlines">
        <div id="main-menu" class="screen active">
            <h1 class="glow-text mega-glow">NEON PONG</h1>
            <div class="menu-buttons">
                <button id="btn-menu-vs-ai" class="cyber-btn mega-btn">VS AI</button>
                <button id="btn-menu-vs-player" class="cyber-btn mega-btn">VS PLAYER</button>
                <button id="btn-settings" class="cyber-btn mega-btn">THEMES</button>
            </div>
        </div>

        <div id="setup-ai-menu" class="screen">
            <h1 class="glow-text mega-glow">VS AI</h1>
            <div class="menu-buttons">
                <label>P1 Name:
                    <input type="text" id="ai-p1Name" class="cyber-select cyber-input" style="width: 150px" placeholder="PLAYER 1" value="PLAYER 1">
                </label>
                <label>Difficulty:
                    <select id="ai-botDifficulty" class="cyber-select">
                        <option value="easy">Easy</option>
                        <option value="medium" selected>Medium</option>
                        <option value="hard">Hard</option>
                        <option value="insane">Insane</option>
                        <option value="extreme">Extreme</option>
                    </select>
                </label>
                <label>Goal Score:
                    <input type="number" id="ai-gameWinScore" class="cyber-select cyber-input" min="3" max="10" value="10">
                </label>
                <label>Speed:
                    <select id="ai-gameSpeed" class="cyber-select">
                        <option value="0.5">Slow (0.5x)</option>
                        <option value="1" selected>Normal (1.0x)</option>
                        <option value="1.5">Fast (1.5x)</option>
                        <option value="2">Hyper (2.0x)</option>
                    </select>
                </label>
                <button id="start-vs-ai" class="cyber-btn mega-btn" style="margin-top: 10px;">START MATCH</button>
                <button class="cyber-btn mega-btn btn-back-main">BACK</button>
            </div>
        </div>

        <div id="setup-pvp-menu" class="screen">
            <h1 class="glow-text mega-glow">VS PLAYER</h1>
            <div class="menu-buttons">
                <label>P1 Name:
                    <input type="text" id="pvp-p1Name" class="cyber-select cyber-input" style="width: 150px" placeholder="PLAYER 1" value="PLAYER 1">
                </label>
                <label>P2 Name:
                    <input type="text" id="pvp-p2Name" class="cyber-select cyber-input" style="width: 150px" placeholder="PLAYER 2" value="PLAYER 2">
                </label>
                <label>Speed:
                    <select id="pvp-gameSpeed" class="cyber-select">
                        <option value="0.5">Slow (0.5x)</option>
                        <option value="1" selected>Normal (1.0x)</option>
                        <option value="1.5">Fast (1.5x)</option>
                        <option value="2">Hyper (2.0x)</option>
                    </select>
                </label>
                <button id="start-vs-pvp" class="cyber-btn mega-btn" style="margin-top: 10px;">START MATCH</button>
                <button class="cyber-btn mega-btn btn-back-main">BACK</button>
            </div>
        </div>

        <div id="settings-menu" class="screen">
            <h1 class="glow-text mega-glow">THEMES</h1>
            <div class="menu-buttons">
                <label>Theme:
                    <select id="gameTheme" class="cyber-select">
                        <option value="green">Matrix Green</option>
                        <option value="magenta">Cyber Magenta</option>
                        <option value="cyan">Tron Cyan</option>
                        <option value="white">Retro White</option>
                    </select>
                </label>
                <button class="cyber-btn mega-btn btn-back-main" style="margin-top: 10px;">BACK</button>
            </div>
        </div>

        <div id="game-screen" class="screen">
            <div id="ui-panel">
                <h1 class="glow-text">NEON PONG</h1>
                <div class="controls">
                    <button id="restartBtn" class="cyber-btn">QUIT</button>
                </div>
                <div class="instructions">
                    P1: [W] [S] | P2: [Up] [Down]
                </div>
            </div>
            <div class="canvas-container">
                <canvas id="gameCanvas" width="800" height="500"></canvas>
            </div>
            <!-- Mobile touch controls -->
            <div id="touch-controls">
                <div class="touch-label">P1 (LEFT) &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; P2 (RIGHT)</div>
                <div class="touch-zone-row">
                    <button id="touch-p1-up"   class="touch-btn">▲</button>
                    <button id="touch-p1-down" class="touch-btn">▼</button>
                    <button id="touch-p2-up"   class="touch-btn">▲</button>
                    <button id="touch-p2-down" class="touch-btn">▼</button>
                </div>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
